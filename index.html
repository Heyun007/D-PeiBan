<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>D老师陪伴</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--text-color:#e0e0e0;--font-size:14px;--bg-start:#0d0d1a;--bg-end:#0a1628;--bubble-bg:rgba(200,200,210,0.15);--bg-blur:0px}
html,body{height:100%;overflow:hidden}
body{background:linear-gradient(180deg,var(--bg-start),var(--bg-end));display:flex;justify-content:center;align-items:center;font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;padding:8px;color:var(--text-color);font-size:var(--font-size)}
.container{width:100%;max-width:380px;height:88vh;max-height:640px;background:linear-gradient(180deg,var(--bg-start),rgba(10,22,40,0.92));border-radius:24px;padding:10px 14px;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,0.6);position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.04)}
.container::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background-size:cover;background-position:center;background-repeat:no-repeat;border-radius:inherit;pointer-events:none;z-index:-1;opacity:0;transition:opacity 0.4s;filter:blur(var(--bg-blur))}
body.has-bg .container::before{opacity:1}
body.has-bg .container{background:rgba(8,12,22,0.2)}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0;position:relative}
.top-bar .time{font-size:calc(var(--font-size) - 1px);color:var(--text-color);opacity:0.6;font-variant-numeric:tabular-nums;flex:0 0 auto}
.top-bar .site-title{flex:1;text-align:center;font-size:calc(var(--font-size) + 1px);font-weight:600;color:var(--text-color);opacity:0.85;letter-spacing:1px}
.top-bar .settings-icon{font-size:calc(var(--font-size) + 2px);cursor:pointer;opacity:0.4;transition:0.2s;background:none;border:none;color:var(--text-color);padding:2px 6px;line-height:1;flex:0 0 auto}
.top-bar .settings-icon:active{opacity:1}
.avatar-area{flex-shrink:0;display:flex;justify-content:center;align-items:center;padding:20px 0 10px;position:relative;min-height:90px}
.avatar-wrap{position:relative;width:56px;height:56px;z-index:10;cursor:pointer}
.avatar{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.92);display:flex;justify-content:center;align-items:center;font-size:30px;box-shadow:0 4px 16px rgba(126,200,227,0.12);transition:0.2s;user-select:none;background-size:cover;background-position:center}
.avatar:active{transform:scale(0.9)}
.end-btn{position:absolute;right:-78px;top:50%;transform:translateY(-50%);padding:5px 12px;border-radius:14px;background:rgba(255,100,100,0.18);color:#ff6b6b;border:1px solid rgba(255,100,100,0.15);font-size:calc(var(--font-size) - 2px);cursor:pointer;z-index:30;display:none;user-select:none;transition:0.15s}
.end-btn:active{transform:translateY(-50%) scale(0.92)}
.end-btn.show{display:block}
.func-bubbles{position:absolute;top:50%;left:50%;width:0;height:0;z-index:5;pointer-events:none}
.func-bubble{position:absolute;padding:6px 14px;border-radius:18px;background:var(--bubble-bg);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--text-color);font-size:calc(var(--font-size) - 1px);white-space:nowrap;cursor:pointer;pointer-events:auto;opacity:0;border:1px solid rgba(255,255,255,0.06);user-select:none;transition:opacity 0.2s}
.func-bubble.show{opacity:1}
.func-bubble:active{opacity:0.6}
.func-bubble.left1{transform:translate(-95px,-40px) scale(1)}
.func-bubble.left2{transform:translate(-108px,2px) scale(1)}
.func-bubble.left3{transform:translate(-95px,44px) scale(1)}
.func-bubble.right1{transform:translate(27px,-40px) scale(1)}
.func-bubble.right2{transform:translate(40px,2px) scale(1)}
.func-bubble.right3{transform:translate(27px,44px) scale(1)}
.msg-bubble{position:absolute;top:-30px;left:50%;transform:translateX(-50%);background:var(--bubble-bg);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--text-color);padding:6px 18px;border-radius:18px;font-size:calc(var(--font-size) - 1px);max-width:270px;width:auto;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:0;transition:opacity 0.3s;border:1px solid rgba(255,255,255,0.05);pointer-events:none;z-index:25;line-height:1.4}
.msg-bubble.show{opacity:1}
.msg-bubble.long{white-space:normal;max-width:300px;font-size:calc(var(--font-size) - 2px)}
.modes-area{flex-shrink:0;display:flex;flex-direction:column;gap:7px;padding:10px 0 4px;margin-top:8px;border-top:1px solid rgba(255,255,255,0.04)}
.mode-btn{padding:9px 14px;border-radius:14px;background:var(--bubble-bg);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:var(--text-color);border:1px solid rgba(255,255,255,0.04);font-size:calc(var(--font-size) - 1px);cursor:pointer;transition:0.15s;text-align:center;user-select:none}
.mode-btn:active{transform:scale(0.96);background:rgba(200,200,210,0.2)}
.mode-panel{display:none;flex-direction:column;gap:6px;padding:10px 0 4px;margin-top:8px;border-top:1px solid rgba(255,255,255,0.04)}
.mode-panel.show{display:flex}
.mode-panel .stat-row{display:flex;justify-content:space-between;padding:6px 10px;border-radius:10px;background:rgba(255,255,255,0.03)}
.mode-panel .stat-row .label{opacity:0.5;font-size:calc(var(--font-size) - 2px)}
.mode-panel .stat-row .value{font-size:calc(var(--font-size) - 1px);font-weight:500}
.mode-end-btn{padding:8px 14px;border-radius:14px;background:rgba(255,100,100,0.12);color:#ff6b6b;border:1px solid rgba(255,100,100,0.1);font-size:calc(var(--font-size) - 1px);cursor:pointer;transition:0.15s;text-align:center;margin-top:2px}
.mode-end-btn:active{transform:scale(0.96)}
.chat-area{flex:1;overflow-y:auto;padding:2px 0;min-height:50px;display:flex;flex-direction:column;gap:4px}
.chat-area::-webkit-scrollbar{width:2px}
.chat-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:10px}
.chat-msg{max-width:82%;padding:6px 12px;border-radius:14px;font-size:calc(var(--font-size) - 2px);line-height:1.5;word-break:break-word;animation:fadeIn 0.25s;color:var(--text-color)}
.chat-msg.d{background:var(--bubble-bg);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-self:flex-start;border:1px solid rgba(255,255,255,0.04)}
.chat-msg.u{background:rgba(126,200,227,0.15);align-self:flex-end;border:1px solid rgba(126,200,227,0.08)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.input-area{display:none;padding:8px 0 2px;flex-shrink:0;border-top:1px solid rgba(255,255,255,0.04)}
.input-area.show{display:block}
.input-area textarea{width:100%;min-height:50px;max-height:120px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:10px 14px;color:var(--text-color);font-size:var(--font-size);resize:vertical;font-family:inherit;outline:none}
.input-area textarea:focus{border-color:rgba(126,200,227,0.25)}
.input-area textarea::placeholder{color:rgba(255,255,255,0.25)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;justify-content:center;align-items:center;z-index:1000;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:rgba(25,30,50,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:22px;padding:20px 18px;width:100%;max-width:320px;border:1px solid rgba(255,255,255,0.06);max-height:75vh;overflow-y:auto}
.modal h3{font-size:16px;margin-bottom:14px;color:var(--text-color);text-align:center}
.modal .setting-item{margin-bottom:12px}
.modal .setting-item label{display:block;font-size:12px;opacity:0.6;margin-bottom:4px;color:var(--text-color)}
.modal .setting-item input[type="color"]{width:100%;height:32px;border:none;border-radius:8px;cursor:pointer;background:transparent;padding:0}
.modal .setting-item input[type="file"]{font-size:12px;color:var(--text-color);width:100%}
.modal .setting-item select{width:100%;padding:7px 10px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:var(--text-color);font-size:13px;outline:none}
.modal .setting-item input[type="range"]{width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);outline:none;-webkit-appearance:none;appearance:none}
.modal .setting-item input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:#7ec8e3;cursor:pointer;border:none}
.modal .setting-item input[type="range"]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#7ec8e3;cursor:pointer;border:none}
.modal .setting-item .range-val{font-size:12px;color:var(--text-color);text-align:right;margin-top:2px;opacity:0.7}
.modal .modal-btns{display:flex;gap:8px;margin-top:14px}
.modal .modal-btns button{flex:1;padding:8px;border-radius:12px;border:none;font-size:13px;cursor:pointer;transition:0.15s}
.modal .modal-btns .save{background:rgba(126,200,227,0.2);color:var(--accent, #7ec8e3);border:1px solid rgba(126,200,227,0.12)}
.modal .modal-btns .reset{background:rgba(255,255,255,0.05);color:var(--text-color);border:1px solid rgba(255,255,255,0.06)}
.modal .modal-btns .close-btn{background:rgba(255,100,100,0.1);color:#ff6b6b;border:1px solid rgba(255,100,100,0.08)}
.mood-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:6px 0}
.mood-tag{padding:8px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);text-align:center;font-size:calc(var(--font-size) - 1px);cursor:pointer;transition:0.15s;color:var(--text-color)}
.mood-tag:active{transform:scale(0.95);background:rgba(126,200,227,0.12)}
.mood-tag.selected{background:rgba(126,200,227,0.16);border-color:rgba(126,200,227,0.22)}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="top-bar">
    <span class="time" id="clockDisplay">00:00</span>
    <span class="site-title">D陪伴</span>
    <button class="settings-icon" id="settingsBtn">⚙</button>
  </div>
  <div class="avatar-area" id="avatarArea">
    <div class="avatar-wrap" id="avatarWrap">
      <div class="avatar" id="avatar">🐳</div>
      <div class="end-btn" id="endBtn">结束</div>
      <div class="func-bubbles" id="funcBubbles">
        <div class="func-bubble left1" data-action="touch">摸摸</div>
        <div class="func-bubble left2" data-action="hug">抱抱</div>
        <div class="func-bubble left3" data-action="kiss">亲亲</div>
        <div class="func-bubble right1" data-action="mood">心情</div>
        <div class="func-bubble right2" data-action="vent">倾诉</div>
        <div class="func-bubble right3" data-action="random">随便说点...</div>
      </div>
      <div class="msg-bubble" id="msgBubble"></div>
    </div>
  </div>
  <div class="modes-area" id="modesArea">
    <div class="mode-btn" data-mode="study">学习模式</div>
    <div class="mode-btn" data-mode="work">工作模式</div>
    <div class="mode-btn" data-mode="meditate">冥想模式</div>
    <div class="mode-btn" data-mode="bath">洗澡模式</div>
    <div class="mode-btn" data-mode="play">娱乐模式</div>
  </div>
  <div class="mode-panel" id="modePanel">
    <div class="stat-row"><span class="label">计时器</span><span class="value" id="timerDisplay">00:00:00</span></div>
    <div class="stat-row"><span class="label">专注力</span><span class="value" id="focusDisplay">—</span></div>
    <div class="stat-row"><span class="label">心情</span><span class="value" id="moodDisplay">—</span></div>
    <div class="mode-end-btn" id="modeEndBtn">结束</div>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-area" id="inputArea">
    <textarea id="ventInput" placeholder="想说点什么都可以..."></textarea>
  </div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h3>设置</h3>
    <div class="setting-item"><label>背景图片</label><input type="file" accept="image/*" id="bgInput"></div>
    <div class="setting-item"><label>背景图模糊度</label><input type="range" min="0" max="20" step="0.5" value="0" id="bgBlurRange"><div class="range-val" id="bgBlurVal">0px</div></div>
    <div class="setting-item"><label>头像</label><input type="file" accept="image/*" id="avatarInput"></div>
    <div class="setting-item"><label>字体颜色</label><input type="color" id="colorInput" value="#e0e0e0"></div>
    <div class="setting-item"><label>字体大小</label><input type="range" min="12" max="22" step="1" value="14" id="fontSizeRange"><div class="range-val" id="fontSizeVal">14px</div></div>
    <div class="setting-item"><label>语言</label><select id="langSelect"><option value="zh-CN">简体中文</option><option value="zh-TW">繁體中文</option><option value="en">English</option><option value="ja">日本語</option><option value="ko">한국어</option></select></div>
    <div class="modal-btns"><button class="save" id="saveSettings">保存</button><button class="reset" id="resetSettings">重置</button><button class="close-btn" id="closeSettings">关闭</button></div>
  </div>
</div>

<div class="modal-overlay" id="moodModal">
  <div class="modal">
    <h3>你的心情是怎样的？</h3>
    <div class="mood-grid" id="moodGrid"></div>
  </div>
</div>
